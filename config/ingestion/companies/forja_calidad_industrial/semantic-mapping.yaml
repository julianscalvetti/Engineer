mapping_version: semantic-mapping-v1
mapping_id: forja-calidad-industrial-semantic-mapping-v1-draft
source_file_name: "forja_calidad_industrial.xlsx"
source_file_sha256: "9d99662c9ca6e66d9971ba0956600d55bfc0e5ebffedd84f45e474db17308b32"
source_selection_path: source-selection.yaml
status: draft
company_context: forja_calidad_industrial
assumptions:
  - "Esta configuracion prueba MP-04 en una nueva industria usando solo primitivas existentes del motor."
  - "LOG_FORJA_PRODUCCION se interpreta como fuente de controles row_table con mediciones declarativas."
  - "MAESTRO_PIEZAS_OBSOLETAS se usa como catalogo disponible de piezas, aunque puede no contener todas las piezas observadas en el log."
unresolved_decisions:
  - "La fecha por fila queda fuera del mapping porque el bloque tabular aprobado no expone una columna con encabezado usable para la fecha; el motor actual no referencia columnas por posicion."
  - "OBS queda fuera del mapping porque no hay contrato semantico actual para notas de control en esta prueba."
  - "PRESION_HIDRAULICA no declara unidad en la fuente; se conserva como medicion sin unit."

sources:
  - id: products
    layout: row_table
    sheet: "MAESTRO_PIEZAS_OBSOLETAS"
    header_row: 1
    data_range: "A1:C3"
    fields:
      - source_column: "CODIGO"
        semantic_field: product.external_code
        data_type: string
        required: true
        treatment: direct
        transformations:
          - trim
          - preserve_string
        preserve_raw_value: true
      - source_column: "ESPEC_TECNICA"
        semantic_field: derived_ignore.technical_specification
        data_type: string
        required: false
        treatment: derived_ignore
        transformations:
          - trim
          - preserve_string
        preserve_raw_value: true
      - source_column: "VIGENCIA"
        semantic_field: derived_ignore.catalog_validity
        data_type: string
        required: false
        treatment: derived_ignore
        transformations:
          - trim
          - preserve_string
        preserve_raw_value: true

  - id: controls
    layout: row_table
    sheet: "LOG_FORJA_PRODUCCION"
    header_row: 2
    data_range: "E2:L2002"
    depends_on:
      - products
    fields:
      - source_column: "ID LOTE"
        semantic_field: control.lot_code
        data_type: string
        required: true
        treatment: direct
        transformations:
          - trim
          - preserve_string
        preserve_raw_value: true
      - source_column: "PIEZA_ID"
        semantic_field: product.external_code
        data_type: string
        required: true
        treatment: lookup
        transformations:
          - trim
          - preserve_string
        lookup:
          catalog_source: products
          catalog_match_field: product.external_code
          input_field: product.external_code
          required: true
          on_unresolved: pending_review
          on_ambiguous: rejected
          preserve_input_value: true
        preserve_raw_value: true
      - source_column: "OPERARIO"
        semantic_field: control.operator
        data_type: string
        required: false
        treatment: direct
        transformations:
          - trim
          - normalize_whitespace
        preserve_raw_value: true
      - source_column: "TURNO"
        semantic_field: control.shift
        data_type: string
        required: false
        treatment: direct
        transformations:
          - trim
          - normalize_whitespace
        preserve_raw_value: true
      - source_column: "ESTADO"
        semantic_field: control.conformity_status
        data_type: string
        required: false
        treatment: direct
        transformations:
          - trim
          - preserve_string
        preserve_raw_value: true
    measurements:
      - id: furnace_temperature
        characteristic:
          external_code: furnace_temperature
          name: Furnace temperature
        value:
          source_column: "TEMP_HORNO_C"
          data_type: decimal
          required: false
          transformations:
            - parse_decimal
          preserve_raw_value: true
        unit: C
      - id: hydraulic_pressure
        characteristic:
          external_code: hydraulic_pressure
          name: Hydraulic pressure
        value:
          source_column: "PRESION_HIDRAULICA"
          data_type: decimal
          required: false
          transformations:
            - parse_decimal
          preserve_raw_value: true
      - id: dimensional_tolerance
        characteristic:
          external_code: dimensional_tolerance
          name: Dimensional tolerance
        value:
          source_column: "TOLERANCIA_MM"
          data_type: decimal
          required: false
          transformations:
            - parse_decimal
          preserve_raw_value: true
        unit: mm

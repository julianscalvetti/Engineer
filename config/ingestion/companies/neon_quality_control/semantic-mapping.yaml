source_selection_path: source-selection.yaml
status: draft
company_context: neon_quality_control
assumptions:
  - "MP-06 uses generic source_column_selector to disambiguate duplicated headers without source-specific engine logic."
  - "The duplicated DEFECTO_ELECTRONICO columns are selected by header plus occurrence."
unresolved_decisions:
  - "FORMULA_COSTO is preserved as derived_ignore because formulas are not a normalized operational concept in the current mapping model."
  - "NOTAS is preserved as derived_ignore because free-text control notes do not have a canonical field in the current mapping model."
  - "REPORTE_MENSUAL is excluded because it is an aggregate report."

sources:
  - id: components
    layout: row_table
    sheet: "MAESTRO_COMPONENTES"
    header_row: 1
    data_range: "A1:D5"
    fields:
      - source_column: "ID_COMPONENTE"
        semantic_field: product.external_code
        data_type: string
        required: true
        treatment: direct
        transformations:
          - trim
          - preserve_string
        preserve_raw_value: true
      - source_column: "TIPO"
        semantic_field: product.name
        data_type: string
        required: false
        treatment: direct
        transformations:
          - trim
          - normalize_whitespace
        preserve_raw_value: true
      - source_column: "COLOR_NEON"
        semantic_field: derived_ignore.color
        data_type: string
        required: false
        treatment: derived_ignore
        transformations:
          - trim
          - normalize_whitespace
        preserve_raw_value: true
      - source_column: "PROVEEDOR"
        semantic_field: derived_ignore.supplier
        data_type: string
        required: false
        treatment: derived_ignore
        transformations:
          - trim
          - normalize_whitespace
        preserve_raw_value: true

